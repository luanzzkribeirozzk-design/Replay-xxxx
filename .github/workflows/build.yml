name: Build APK - Passador de Replay X

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Gerar Gradle Wrapper
        run: gradle wrapper --gradle-version=8.4

      - name: Remover arquivos Kotlin obsoletos
        run: |
          rm -f app/src/main/java/com/replayx/app/ui/LoginActivity.kt
          echo "Arquivos obsoletos removidos"

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReplayX-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
